<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/devlink.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap"
      rel="stylesheet" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://linkdev.online" />

    <!-- PRIMARY SEO -->
    <title>DevLink - Connect, Collaborate & Grow with Developers</title>
    <meta
      name="description"
      content="DevLink is a developer networking platform where coders connect, share ideas, collaborate on projects, and grow their careers through a supportive tech community." />

    <!-- KEYWORDS (optional but helpful) -->
    <meta
      name="keywords"
      content="developer community, developer networking, coding community, project collaboration, dev profiles, software developers, programming community, tech networking" />

    <!-- SOCIAL SHARE: OPEN GRAPH -->
    <meta
      property="og:title"
      content="DevLink — Connect, Collaborate & Grow with Developers" />
    <meta
      property="og:description"
      content="Join DevLink to network with developers, collaborate on projects, and build your developer profile." />
    <meta property="og:image" content="https://linkdev.online/devlink.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://linkdev.online/" />

    <!-- TWITTER CARD -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="DevLink — Developer Networking Platform" />
    <meta
      name="twitter:description"
      content="A modern platform for developers to connect, share ideas, and collaborate on projects." />
    <meta name="twitter:image" content="https://linkdev.online/devlink.png" />

    <!-- ALLOW SEARCH ENGINES -->
    <meta name="robots" content="index, follow" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "DevLink",
        "url": "https://linkdev.online"
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
